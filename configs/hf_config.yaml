model:
  name: "gpt2"  # Free, small Llama model
  type: "huggingface"
  max_length: 100
  temperature: 0.7
  device: "cpu"  # or "gpu"
  load_in_8bit: false  # Set to true for memory efficiency

defenses:
  enabled: true
  input_sanitization: true
  output_filtering: true
  poison_detection: true
  max_prompt_length: 2000

evaluation:
  num_test_prompts: 50
  save_results: true
  output_dir: "results"
  auto_visualize: true # Added

logging:
  level: "INFO"
  